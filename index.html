            return <LanguageContext.Provider value={{ lang, setLang, t }}>{children}</LanguageContext.Provider>;

                        <div className="inline-block mb-6 px-4 py-1.5 rounded-full glass-panel border border-white/10 font-label-sm text-secondary-fixed-dim uppercase tracking-widest text-xs">
                            {t.hero.label}
                        </div>
                        {/* Изменено на структурированный H1 для SEO */}
                        <h1 className="text-display-xl-mobile md:text-display-xl font-bold mb-6 leading-tight text-on-surface">
                            {t.hero.heading1} <br className="hidden md:block"/>
                            <span className="bg-clip-text text-transparent bg-gradient-to-r from-secondary to-tertiary">{t.hero.heading2}</span>
                        </h1>
                        <p className="text-body-lg text-on-surface-variant mb-10 max-w-2xl mx-auto">{t.hero.desc}</p>
                        <a href="https://wa.me/79211115005" target="_blank" rel="noopener noreferrer" className="btn-primary px-10 py-4 rounded-full font-bold text-lg shadow-[0_0_20px_rgba(49,49,192,0.6)] inline-block">
                            {t.btnOrder}
                        </a>
                        
                        <div className="mt-16 flex flex-col items-center">
                            <span className="text-secondary-fixed-dim text-sm font-bold uppercase tracking-widest mb-6">{t.social}</span>
                            <div className="flex gap-8" style={{direction: 'ltr'}}>
                                <a href="https://www.instagram.com/dsite222/" target="_blank" rel="noopener noreferrer" className="text-on-surface-variant hover:text-secondary transition-colors" aria-label="Instagram">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
                                </a>
                                <a href="https://wa.me/79211115005" target="_blank" rel="noopener noreferrer" className="text-on-surface-variant hover:text-secondary transition-colors" aria-label="WhatsApp">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                                </a>
                                <a href="https://t.me/Dsite222" target="_blank" rel="noopener noreferrer" className="text-on-surface-variant hover:text-secondary transition-colors" aria-label="Telegram">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                                </a>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const Portfolio = () => {
            const { t } = useContext(LanguageContext);
            const portfolioLink = "https://github.com/Dan4ik-ice/my-portfolio-website";
            return (
                <section id="portfolio" className="py-20">
                    <div className="max-w-container-max mx-auto px-gutter">
                        <div className="text-center mb-16 reveal">
                            {/* Изменено на H2 */}
                            <h2 className="text-headline-lg font-bold mb-4 text-on-surface">{t.portfolio.heading}</h2>
                            <p className="text-on-surface-variant max-w-2xl mx-auto">{t.portfolio.desc}</p>
                        </div>
                        <div className="flex justify-center reveal">
                            <a href={portfolioLink} target="_blank" rel="noopener noreferrer" className="glass-card rounded-2xl overflow-hidden group w-full max-w-2xl">
                                <div className="aspect-video overflow-hidden relative">
                                    {/* Добавлен динамический alt для SEO картинок */}
                                    <img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80" alt={t.portfolio.imgAlt} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
                                    <div className="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                        <span className="text-white font-bold text-xl">{t.portfolio.viewGithub}</span>
                                    </div>
                                </div>
                                <div className="p-8">
                                    <span className="text-secondary text-xs font-bold uppercase tracking-widest block mb-2">{t.portfolio.mainProject}</span>
                                    {/* Изменено на H3 */}
                                    <h3 className="text-headline-md font-bold text-on-surface group-hover:text-tertiary transition-colors">{t.portfolio.projectTitle}</h3>
                                    <p className="text-on-surface-variant mt-2">{t.portfolio.projectDesc}</p>
                                </div>
                            </a>
                        </div>
                    </div>
                </section>
            );
        };

        const Pricing = () => {
            const { t } = useContext(LanguageContext);
            return (
                <section id="pricing" className="py-20 relative overflow-hidden">
                    <div className="max-w-container-max mx-auto px-gutter relative z-10">
                        <div className="text-center mb-16 reveal">
                            {/* Изменено на H2 */}
                            <h2 className="text-headline-lg font-bold mb-4 text-on-surface">{t.pricing.heading}</h2>
                            <p className="text-on-surface-variant max-w-2xl mx-auto">{t.pricing.desc}</p>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl mx-auto">
                            {t.pricing.plans.map((plan, idx) => (
                                <div key={idx} className="glass-card p-8 rounded-3xl reveal flex flex-col h-full">
                                    {/* Изменено на H3 */}
                                    <h3 className="text-2xl font-bold mb-4 text-on-surface">{plan.name}</h3>
                                    <div className="flex items-baseline gap-2 mb-6">
                                        <span className="text-4xl font-bold text-secondary">{plan.price} ₽</span>
                                        <span className="text-lg line-through text-on-surface-variant/50">{plan.oldPrice}</span>
                                        <span className="text-sm font-bold text-on-surface-variant/40 ml-auto">{plan.discount}</span>
                                    </div>
                                    <ul className="space-y-4 mb-10 flex-grow">
                                        {plan.features.map((f, i) => (
                                            <li key={i} className="flex items-center gap-3 text-on-surface-variant">
                                                <IconCheck className="w-5 h-5 text-secondary shrink-0" />
                                                <span>{f}</span>
                                            </li>
                                        ))}
                                    </ul>
                                    <a href="https://wa.me/79211115005" target="_blank" rel="noopener noreferrer" className="btn-primary w-full py-4 rounded-xl font-bold text-center block">{t.pricing.btnChoose}</a>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const Footer = () => {
            const { t } = useContext(LanguageContext);
            return (
                <footer className="glass-panel border-t border-white/10 pt-16 pb-8 mt-20">
                    <div className="max-w-container-max mx-auto px-gutter flex flex-col md:flex-row justify-between items-center gap-6">
                        <div className="flex items-center gap-2">
                            <IconCode className="text-secondary w-6 h-6" />
                            <span className="font-bold text-xl bg-clip-text text-transparent bg-gradient-to-r from-secondary to-tertiary">D-Site</span>
                        </div>
                        <p className="text-on-surface-variant text-sm">© {new Date().getFullYear()} D-Site. {t.footer}</p>
                    </div>
                </footer>
            );
        }

        const App = () => {
            useScrollReveal();
            return (
                <LanguageProvider>
                    <div className="min-h-screen flex flex-col font-body-md bg-background text-on-background">
                        <TopNavBar />
                        <main className="flex-grow">
                            <Hero />
                            <Portfolio />
                            <Pricing />
                        </main>
                        <Footer />
                    </div>
                </LanguageProvider>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
